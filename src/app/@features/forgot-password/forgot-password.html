<div class="auth-page" *transloco="let t">
  <div class="auth-card">
    <a routerLink="/home" class="auth-logo-link">
      <img src="images/logo.png" alt="Golden Bull" class="auth-logo-img" />
      <span class="auth-brand">GOLDEN <span class="auth-brand-accent">BULL</span></span>
    </a>

    @if (!sent()) {
      <h1 class="auth-title">{{ t('auth.resetPassword') }}</h1>
      <p class="auth-subtitle">{{ t('auth.resetSub') }}</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
        <div class="field-group">
          <label>{{ t('auth.email') }}</label>
          <input type="email" formControlName="email" [placeholder]="t('auth.emailPlaceholder')"
            [class.error]="email.invalid && email.touched" />
          @if (email.invalid && email.touched) {
            <span class="field-error">{{ t('auth.emailRequired') }}</span>
          }
        </div>

        <button type="submit" class="auth-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="auth-spinner"></span> {{ t('auth.sending') }}
          } @else {
            {{ t('auth.sendReset') }}
          }
        </button>
      </form>
    } @else {
      <div class="auth-success">
        <div class="success-icon">✓</div>
        <h2>{{ t('auth.resetSent') }}</h2>
        <p>{{ t('auth.resetSentDesc') }}</p>
      </div>
    }

    <p class="auth-footer-text">
      <a routerLink="/login">← {{ t('auth.backToLogin') }}</a>
    </p>
  </div>
</div>
