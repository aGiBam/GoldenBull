# Render "Blueprint" — lets you deploy the backend with one click from
# https://dashboard.render.com/blueprints instead of configuring a web
# service by hand. Points at the backend/ subfolder since this is a
# monorepo (frontend + backend in one repo).
services:
  - type: web
    name: golden-bull-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false # set manually in the Render dashboard from your Neon connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL after the frontend is deployed
